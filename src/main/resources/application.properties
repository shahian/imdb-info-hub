# H2 Database Configuration - keep memory settings conservative for large imports
#spring.datasource.url=jdbc:h2:mem:imdbdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=test
#spring.datasource.password=test

spring.datasource.url=jdbc:h2:file:./h2db/imdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;CACHE_SIZE=65536
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP connection pool - tuned for bulk operations
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=H2Pool


# JPA/Hibernate optimization
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=200
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson JSON serialization - important for large result sets
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Local data files
imdb.data.name=classpath:static/data/name.basics.tsv.gz
imdb.data.title=classpath:static/data/title.basics.tsv.gz
imdb.data.crew=classpath:static/data/title.crew.tsv.gz
imdb.data.ratings=classpath:static/data/title.ratings.tsv.gz
imdb.data.principals=classpath:static/data/title.principals.tsv.gz

#imdb.data.name=file:./data/name.basics.tsv.gz
#imdb.data.title=file:./data/title.basics.tsv.gz
#imdb.data.crew=file:./data/title.crew.tsv.gz
#imdb.data.ratings=file:./data/title.ratings.tsv.gz
#imdb.data.principals=file:./data/title.principals.tsv.gz
# Actuator endpoints
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
management.metrics.enable.jvm.memory=true

# Logging - reduced verbosity during production
logging.level.root=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.h2=WARN



